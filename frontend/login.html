<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 注音輸入法練習</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>注音輸入法練習</h1>
            <p class="subtitle">Zhuyin Input Practice</p>

            <!-- Tab Navigation -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="login">登入</button>
                <button class="tab-btn" data-tab="register">註冊</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-username">帳號</label>
                    <input
                        type="text"
                        id="login-username"
                        name="username"
                        placeholder="請輸入帳號"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="login-password">密碼</label>
                    <input
                        type="password"
                        id="login-password"
                        name="password"
                        placeholder="請輸入密碼"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <div class="error-message" id="login-error"></div>

                <button type="submit" class="btn btn-primary">登入</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-username">帳號</label>
                    <input
                        type="text"
                        id="register-username"
                        name="username"
                        placeholder="請輸入帳號"
                        autocomplete="username"
                        required
                        minlength="3"
                    >
                    <small>至少 3 個字元</small>
                </div>

                <div class="form-group">
                    <label for="register-password">密碼</label>
                    <input
                        type="password"
                        id="register-password"
                        name="password"
                        placeholder="請輸入密碼"
                        autocomplete="new-password"
                        required
                        minlength="6"
                    >
                    <small>至少 6 個字元</small>
                </div>

                <div class="form-group">
                    <label for="register-password-confirm">確認密碼</label>
                    <input
                        type="password"
                        id="register-password-confirm"
                        name="password-confirm"
                        placeholder="請再次輸入密碼"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <div class="error-message" id="register-error"></div>
                <div class="success-message" id="register-success"></div>

                <button type="submit" class="btn btn-primary">註冊</button>
            </form>

            <div class="help-text">
                <p>使用帳號登入以保存練習記錄</p>
            </div>
        </div>
    </div>

    <script type="module">
        import * as auth from './js/modules/auth-backend.js';

        // Check if already logged in
        if (auth.isAuthenticated()) {
            console.log('Already logged in, redirecting to practice page');
            window.location.href = './index-redesign.html';
        }

        // Tab switching
        const tabBtns = document.querySelectorAll('.tab-btn');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;

                // Update active tab button
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Show/hide forms
                if (tab === 'login') {
                    loginForm.classList.add('active');
                    registerForm.classList.remove('active');
                    clearErrors();
                } else {
                    loginForm.classList.remove('active');
                    registerForm.classList.add('active');
                    clearErrors();
                }
            });
        });

        // Clear error/success messages
        function clearErrors() {
            document.querySelectorAll('.error-message, .success-message').forEach(el => {
                el.textContent = '';
                el.style.display = 'none';
            });
        }

        // Show error message
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
        }

        // Show success message
        function showSuccess(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
        }

        // Login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showError('login-error', '請填寫帳號和密碼');
                return;
            }

            // Disable submit button during request
            const submitBtn = loginForm.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '登入中...';

            try {
                const result = await auth.login(username, password);

                if (result.success) {
                    console.log('Login successful, redirecting...');
                    window.location.href = './index-redesign.html';
                } else {
                    showError('login-error', result.error || '登入失敗，請檢查帳號密碼');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('login-error', '發生錯誤，請稍後再試');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登入';
            }
        });

        // Register form submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const username = document.getElementById('register-username').value.trim();
            const password = document.getElementById('register-password').value;
            const passwordConfirm = document.getElementById('register-password-confirm').value;

            // Validation
            if (!username || !password || !passwordConfirm) {
                showError('register-error', '請填寫所有欄位');
                return;
            }

            if (username.length < 3) {
                showError('register-error', '帳號至少需要 3 個字元');
                return;
            }

            if (password.length < 6) {
                showError('register-error', '密碼至少需要 6 個字元');
                return;
            }

            if (password !== passwordConfirm) {
                showError('register-error', '兩次輸入的密碼不一致');
                return;
            }

            // Disable submit button during request
            const submitBtn = registerForm.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '註冊中...';

            try {
                const result = await auth.register(username, password);

                if (result.success) {
                    showSuccess('register-success', '註冊成功！請登入');
                    // Clear form
                    registerForm.reset();
                    // Switch to login tab after 1.5s
                    setTimeout(() => {
                        document.querySelector('.tab-btn[data-tab="login"]').click();
                    }, 1500);
                } else {
                    showError('register-error', result.error || '註冊失敗');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('register-error', '發生錯誤，請稍後再試');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '註冊';
            }
        });
    </script>
</body>
</html>
